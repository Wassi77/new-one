<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orangi Town Runner</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(to bottom, #8B4513, #D2691E);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        #gameContainer {
            position: relative;
            width: 400px;
            height: 600px;
            background: linear-gradient(to bottom, #C4A574 0%, #8B7355 100%);
            border: 4px solid #5D4E37;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        #gameCanvas {
            display: block;
        }

        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            display: flex;
            justify-content: space-between;
            color: #FFF;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            font-size: 18px;
            font-weight: bold;
            z-index: 10;
        }

        #score, #coins {
            background: rgba(0,0,0,0.5);
            padding: 5px 15px;
            border-radius: 20px;
            border: 2px solid #FFD700;
        }

        #startScreen, #gameOverScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #FFF;
            z-index: 20;
        }

        #gameOverScreen {
            display: none;
        }

        h1 {
            font-size: 32px;
            margin-bottom: 20px;
            color: #FFD700;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.8);
            text-align: center;
        }

        h2 {
            font-size: 28px;
            margin-bottom: 15px;
            color: #FF6B6B;
        }

        p {
            font-size: 16px;
            margin-bottom: 10px;
            text-align: center;
            max-width: 80%;
        }

        .btn {
            background: linear-gradient(to bottom, #FFD700, #FFA500);
            border: 3px solid #FF8C00;
            padding: 15px 40px;
            font-size: 20px;
            font-weight: bold;
            color: #5D4E37;
            cursor: pointer;
            border-radius: 30px;
            margin-top: 20px;
            transition: transform 0.2s;
            text-transform: uppercase;
        }

        .btn:hover {
            transform: scale(1.1);
            background: linear-gradient(to bottom, #FFE44D, #FFB84D);
        }

        .controls {
            margin-top: 20px;
            font-size: 14px;
            color: #DDD;
        }

        #message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255, 215, 0, 0.9);
            color: #5D4E37;
            padding: 20px 40px;
            border-radius: 10px;
            font-size: 24px;
            font-weight: bold;
            display: none;
            z-index: 15;
            border: 3px solid #FF8C00;
        }

        /* Background buildings */
        .building {
            position: absolute;
            background: #654321;
            border: 2px solid #3E2723;
        }

        .window {
            position: absolute;
            background: #FFD700;
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="400" height="600"></canvas>
        
        <div id="ui">
            <div id="score">Score: 0</div>
            <div id="coins">Coins: 0</div>
        </div>

        <div id="startScreen">
            <h1>🏘️ Orangi Town Runner</h1>
            <p>Navigate through the narrow streets of Orangi Town!</p>
            <p>Dodge obstacles, collect coins, and survive!</p>
            <div class="controls">
                <p>⬅️ ➡️ Arrow Keys or A/D to move</p>
                <p>⬆️ Space or W to jump</p>
            </div>
            <button class="btn" onclick="startGame()">Start Run</button>
        </div>

        <div id="gameOverScreen">
            <h2>Game Over!</h2>
            <p id="finalScore">Score: 0</p>
            <p id="finalCoins">Coins Collected: 0</p>
            <button class="btn" onclick="startGame()">Try Again</button>
        </div>

        <div id="message"></div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // Game state
        let gameRunning = false;
        let score = 0;
        let coins = 0;
        let speed = 5;
        let frameCount = 0;

        // Player
        const player = {
            x: 200,
            y: 500,
            width: 40,
            height: 60,
            velocityY: 0,
            jumping: false,
            lane: 1, // 0: left, 1: center, 2: right
            color: '#2E8B57'
        };

        const lanes = [80, 200, 320]; // X positions for each lane

        // Obstacles and coins
        let obstacles = [];
        let coinObjects = [];
        let particles = [];

        // Ground scroll
        let groundOffset = 0;

        // Input handling
        document.addEventListener('keydown', (e) => {
            if (!gameRunning) return;

            switch(e.key) {
                case 'ArrowLeft':
                case 'a':
                case 'A':
                    if (player.lane > 0) player.lane--;
                    break;
                case 'ArrowRight':
                case 'd':
                case 'D':
                    if (player.lane < 2) player.lane++;
                    break;
                case 'ArrowUp':
                case ' ':
                case 'w':
                case 'W':
                    if (!player.jumping) {
                        player.velocityY = -15;
                        player.jumping = true;
                    }
                    break;
            }
        });

        function startGame() {
            gameRunning = true;
            score = 0;
            coins = 0;
            speed = 5;
            frameCount = 0;
            player.lane = 1;
            player.y = 500;
            player.velocityY = 0;
            player.jumping = false;
            obstacles = [];
            coinObjects = [];
            particles = [];

            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('gameOverScreen').style.display = 'none';
            document.getElementById('score').textContent = 'Score: 0';
            document.getElementById('coins').textContent = 'Coins: 0';

            gameLoop();
        }

        function gameOver() {
            gameRunning = false;
            document.getElementById('gameOverScreen').style.display = 'flex';
            document.getElementById('finalScore').textContent = 'Score: ' + score;
            document.getElementById('finalCoins').textContent = 'Coins Collected: ' + coins;
        }

        function spawnObstacle() {
            const lane = Math.floor(Math.random() * 3);
            const type = Math.random() > 0.5 ? 'cart' : 'puddle';
            
            obstacles.push({
                lane: lane,
                y: -100,
                type: type,
                width: type === 'cart' ? 50 : 60,
                height: type === 'cart' ? 40 : 20
            });
        }

        function spawnCoin() {
            const lane = Math.floor(Math.random() * 3);
            
            // Don't spawn coin on top of obstacle
            const hasObstacle = obstacles.some(obs => obs.lane === lane && obs.y < 100);
            if (!hasObstacle) {
                coinObjects.push({
                    lane: lane,
                    y: -50,
                    collected: false
                });
            }
        }

        function createParticles(x, y, color) {
            for (let i = 0; i < 10; i++) {
                particles.push({
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * 10,
                    vy: (Math.random() - 0.5) * 10,
                    life: 30,
                    color: color
                });
            }
        }

        function showMessage(text) {
            const msg = document.getElementById('message');
            msg.textContent = text;
            msg.style.display = 'block';
            setTimeout(() => {
                msg.style.display = 'none';
            }, 1000);
        }

        function update() {
            frameCount++;
            score++;

            // Increase speed gradually
            if (frameCount % 600 === 0) {
                speed += 0.5;
                showMessage('Speed Up!');
            }

            // Update player position
            player.x = lanes[player.lane] - player.width / 2;

            // Gravity
            if (player.jumping) {
                player.velocityY += 0.8;
                player.y += player.velocityY;

                if (player.y >= 500) {
                    player.y = 500;
                    player.jumping = false;
                    player.velocityY = 0;
                }
            }

            // Spawn obstacles
            if (frameCount % Math.max(30, 90 - Math.floor(speed * 3)) === 0) {
                spawnObstacle();
            }

            // Spawn coins
            if (frameCount % 45 === 0) {
                spawnCoin();
            }

            // Update obstacles
            for (let i = obstacles.length - 1; i >= 0; i--) {
                obstacles[i].y += speed;

                // Check collision
                if (obstacles[i].lane === player.lane &&
                    obstacles[i].y < player.y + player.height &&
                    obstacles[i].y + obstacles[i].height > player.y &&
                    !player.jumping) {
                    gameOver();
                    return;
                }

                // Remove off-screen obstacles
                if (obstacles[i].y > 650) {
                    obstacles.splice(i, 1);
                }
            }

            // Update coins
            for (let i = coinObjects.length - 1; i >= 0; i--) {
                coinObjects[i].y += speed;

                // Check collection
                if (!coinObjects[i].collected &&
                    coinObjects[i].lane === player.lane &&
                    coinObjects[i].y < player.y + player.height &&
                    coinObjects[i].y + 30 > player.y) {
                    coinObjects[i].collected = true;
                    coins++;
                    score += 50;
                    createParticles(
                        lanes[coinObjects[i].lane],
                        coinObjects[i].y,
                        '#FFD700'
                    );
                    document.getElementById('coins').textContent = 'Coins: ' + coins;
                }

                // Remove off-screen coins
                if (coinObjects[i].y > 650 || coinObjects[i].collected) {
                    coinObjects.splice(i, 1);
                }
            }

            // Update particles
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].x += particles[i].vx;
                particles[i].y += particles[i].vy;
                particles[i].life--;
                if (particles[i].life <= 0) {
                    particles.splice(i, 1);
                }
            }

            // Update ground
            groundOffset = (groundOffset + speed) % 40;

            // Update UI
            document.getElementById('score').textContent = 'Score: ' + score;
        }

        function draw() {
            // Clear canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw background (sky)
            const skyGradient = ctx.createLinearGradient(0, 0, 0, 200);
            skyGradient.addColorStop(0, '#87CEEB');
            skyGradient.addColorStop(1, '#D2691E');
            ctx.fillStyle = skyGradient;
            ctx.fillRect(0, 0, canvas.width, 200);

            // Draw distant buildings (slums/shanties)
            ctx.fillStyle = '#654321';
            for (let i = 0; i < 8; i++) {
                const buildingHeight = 60 + Math.random() * 80;
                ctx.fillRect(i * 55, 200 - buildingHeight, 50, buildingHeight);
                
                // Windows
                ctx.fillStyle = '#FFD700';
                for (let j = 0; j < 3; j++) {
                    if (Math.random() > 0.3) {
                        ctx.fillRect(i * 55 + 10, 200 - buildingHeight + 15 + j * 20, 8, 8);
                        ctx.fillRect(i * 55 + 30, 200 - buildingHeight + 15 + j * 20, 8, 8);
                    }
                }
                ctx.fillStyle = '#654321';
            }

            // Draw ground (dirt road)
            const groundGradient = ctx.createLinearGradient(0, 200, 0, 600);
            groundGradient.addColorStop(0, '#C4A574');
            groundGradient.addColorStop(1, '#8B7355');
            ctx.fillStyle = groundGradient;
            ctx.fillRect(0, 200, canvas.width, 400);

            // Draw road markings
            ctx.strokeStyle = '#FFF';
            ctx.setLineDash([20, 20]);
            ctx.lineDashOffset = -groundOffset;
            ctx.beginPath();
            ctx.moveTo(133, 200);
            ctx.lineTo(133, 600);
            ctx.moveTo(267, 200);
            ctx.lineTo(267, 600);
            ctx.stroke();
            ctx.setLineDash([]);

            // Draw lane dividers (rocks/debris)
            ctx.fillStyle = '#5D4E37';
            for (let i = 0; i < 15; i++) {
                const y = 200 + i * 40 - groundOffset;
                if (y > 200 && y < 600) {
                    ctx.beginPath();
                    ctx.arc(133, y, 5, 0, Math.PI * 2);
                    ctx.arc(267, y, 5, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            // Draw obstacles
            obstacles.forEach(obs => {
                const x = lanes[obs.lane] - obs.width / 2;
                
                if (obs.type === 'cart') {
                    // Draw cart/vehicle obstacle
                    ctx.fillStyle = '#8B4513';
                    ctx.fillRect(x, obs.y, obs.width, obs.height);
                    
                    // Wheels
                    ctx.fillStyle = '#2F2F2F';
                    ctx.beginPath();
                    ctx.arc(x + 10, obs.y + obs.height, 8, 0, Math.PI * 2);
                    ctx.arc(x + obs.width - 10, obs.y + obs.height, 8, 0, Math.PI * 2);
                    ctx.fill();
                    
                    // Cart details
                    ctx.fillStyle = '#654321';
                    ctx.fillRect(x + 5, obs.y + 5, obs.width - 10, obs.height - 10);
                } else {
                    // Draw puddle obstacle
                    ctx.fillStyle = '#4A4A4A';
                    ctx.beginPath();
                    ctx.ellipse(
                        lanes[obs.lane],
                        obs.y + obs.height / 2,
                        obs.width / 2,
                        obs.height / 2,
                        0, 0, Math.PI * 2
                    );
                    ctx.fill();
                    
                    // Water reflection
                    ctx.fillStyle = '#6B8E9F';
                    ctx.beginPath();
                    ctx.ellipse(
                        lanes[obs.lane] - 5,
                        obs.y + obs.height / 2 - 3,
                        obs.width / 3,
                        obs.height / 3,
                        0, 0, Math.PI * 2
                    );
                    ctx.fill();
                }
            });

            // Draw coins
            coinObjects.forEach(coin => {
                if (!coin.collected) {
                    const x = lanes[coin.lane];
                    const y = coin.y;
                    
                    // Coin glow
                    ctx.fillStyle = 'rgba(255, 215, 0, 0.3)';
                    ctx.beginPath();
                    ctx.arc(x, y, 25, 0, Math.PI * 2);
                    ctx.fill();
                    
                    // Coin
                    ctx.fillStyle = '#FFD700';
                    ctx.beginPath();
                    ctx.arc(x, y, 15, 0, Math.PI * 2);
                    ctx.fill();
                    
                    // Coin shine
                    ctx.fillStyle = '#FFF';
                    ctx.beginPath();
                    ctx.arc(x - 5, y - 5, 5, 0, Math.PI * 2);
                    ctx.fill();
                    
                    // Rupee symbol
                    ctx.fillStyle = '#B8860B';
                    ctx.font = 'bold 16px Arial';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText('₨', x, y);
                }
            });

            // Draw player
            const playerX = player.x;
            const playerY = player.y;
            
            // Shadow
            ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
            ctx.beginPath();
            ctx.ellipse(playerX + player.width / 2, playerY + player.height + 5, 20, 8, 0, 0, Math.PI * 2);
            ctx.fill();
            
            // Body
            ctx.fillStyle = player.color;
            ctx.fillRect(playerX, playerY, player.width, player.height);
            
            // Head
            ctx.fillStyle = '#8B6F47';
            ctx.beginPath();
            ctx.arc(playerX + player.width / 2, playerY - 10, 18, 0, Math.PI * 2);
            ctx.fill();
            
            // Eyes
            ctx.fillStyle = '#FFF';
            ctx.beginPath();
            ctx.arc(playerX + player.width / 2 - 6, playerY - 12, 5, 0, Math.PI * 2);
            ctx.arc(playerX + player.width / 2 + 6, playerY - 12, 5, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.fillStyle = '#000';
            ctx.beginPath();
            ctx.arc(playerX + player.width / 2 - 6, playerY - 12, 2, 0, Math.PI * 2);
            ctx.arc(playerX + player.width / 2 + 6, playerY - 12, 2, 0, Math.PI * 2);
            ctx.fill();
            
            // Shirt detail
            ctx.fillStyle = '#3CB371';
            ctx.fillRect(playerX + 5, playerY + 10, player.width - 10, 25);

            // Draw particles
            particles.forEach(p => {
                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.life / 30;
                ctx.beginPath();
                ctx.arc(p.x, p.y, 5, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1;
            });

            // Draw power lines
            ctx.strokeStyle = '#2F2F2F';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(0, 150);
            ctx.lineTo(400, 150);
            ctx.stroke();
            
            ctx.beginPath();
            ctx.moveTo(0, 170);
            ctx.lineTo(400, 170);
            ctx.stroke();
            
            // Power poles
            ctx.fillStyle = '#5D4E37';
            ctx.fillRect(50, 150, 10, 50);
            ctx.fillRect(350, 150, 10, 50);
        }

        function gameLoop() {
            if (!gameRunning) return;

            update();
            draw();

            requestAnimationFrame(gameLoop);
        }

        // Initial draw
        draw();
    </script>
</body>
</html>
